<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <link rel="manifest" href="manifest.json" />
  <title>V-Taper Coach</title>
  <style>
    :root{--bg:#070b14;--panel:#0d1526;--panel2:#111c31;--line:#20304f;--text:#eef4ff;--muted:#93a4c3;--accent:#7dd3fc;--accent2:#a78bfa;--good:#22c55e;--warn:#f59e0b;--bad:#ef4444;--shadow:0 18px 60px rgba(0,0,0,.35);--radius:22px}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top,#12213d 0,#070b14 45%,#05070d 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;min-height:100vh;padding-bottom:92px} button,input,select,textarea{font:inherit} a{color:inherit}.app{max-width:980px;margin:0 auto;padding:18px 14px 0}.hero{background:linear-gradient(145deg,rgba(125,211,252,.18),rgba(167,139,250,.12) 45%,rgba(17,24,39,.88));border:1px solid rgba(125,211,252,.22);border-radius:28px;padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden}.hero:after{content:"";position:absolute;width:160px;height:160px;border-radius:50%;background:rgba(125,211,252,.16);right:-60px;top:-50px;filter:blur(2px)}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;position:relative;z-index:1}.brand{display:flex;gap:12px;align-items:center}.logo{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;font-weight:900;color:#06101d}.brand h1{font-size:21px;margin:0}.brand p{font-size:12px;color:var(--muted);margin:3px 0 0}.pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:8px 11px;color:var(--text);font-size:12px}.heroTitle{margin:22px 0 6px;font-size:34px;letter-spacing:-1.2px;line-height:1.02;position:relative;z-index:1}.heroSub{margin:0;color:#c6d3ee;line-height:1.4;max-width:650px;position:relative;z-index:1}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}.metric{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);border-radius:18px;padding:13px}.metric b{display:block;font-size:22px}.metric span{color:var(--muted);font-size:12px}.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(7,11,20,.78);backdrop-filter:blur(18px);border-top:1px solid rgba(255,255,255,.12);z-index:20;padding:10px max(10px,env(safe-area-inset-left)) calc(10px + env(safe-area-inset-bottom))}.navInner{max-width:980px;margin:auto;display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.nav button{border:0;border-radius:16px;background:transparent;color:var(--muted);padding:9px 4px;font-size:11px}.nav button b{display:block;font-size:20px;margin-bottom:2px}.nav button.active{background:rgba(125,211,252,.16);color:var(--text)}.section{display:none;animation:fade .2s ease}.section.active{display:block}@keyframes fade{from{opacity:.5;transform:translateY(6px)}to{opacity:1;transform:none}}.card{background:rgba(13,21,38,.92);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius);padding:16px;margin:14px 0;box-shadow:0 10px 30px rgba(0,0,0,.18)}.card h2,.card h3{margin:0 0 10px}.muted{color:var(--muted)}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.btn{border:0;border-radius:16px;padding:12px 14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#06101d;font-weight:800}.btn.secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid rgba(255,255,255,.12)}.btn.good{background:linear-gradient(135deg,#86efac,#22c55e)}.select,input,textarea{width:100%;background:#091224;border:1px solid var(--line);color:var(--text);border-radius:14px;padding:12px;outline:none}.tabs{display:flex;gap:8px;overflow:auto;padding:4px 0 8px}.tab{white-space:nowrap;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:var(--muted);border-radius:999px;padding:9px 12px}.tab.active{color:#06101d;background:var(--accent);font-weight:800}.exercise{border:1px solid rgba(255,255,255,.1);background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border-radius:20px;padding:14px;margin:12px 0}.exercise.done{border-color:rgba(34,197,94,.55);background:rgba(34,197,94,.08)}.exHead{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}.exName{font-size:18px;font-weight:800}.exName a{color:var(--text);text-decoration:none}.exName a:active,.exName a:hover{color:var(--accent)}.tag{display:inline-flex;align-items:center;border-radius:999px;background:rgba(125,211,252,.13);color:#bdeeff;border:1px solid rgba(125,211,252,.22);font-size:12px;padding:5px 8px;margin:4px 5px 0 0}.prescription{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:12px 0}.mini{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:9px;text-align:center}.mini b{display:block}.mini span{font-size:11px;color:var(--muted)}.formGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}.list{display:grid;gap:10px}.libraryItem{padding:14px;border:1px solid rgba(255,255,255,.1);border-radius:18px;background:rgba(255,255,255,.05)}.bar{height:10px;background:#111827;border-radius:999px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0}.timer{font-size:46px;font-weight:900;letter-spacing:-1px;text-align:center}.photoGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.photoBox{border:1px dashed rgba(255,255,255,.25);border-radius:18px;min-height:160px;display:grid;place-items:center;background:rgba(255,255,255,.04);overflow:hidden}.photoBox img{width:100%;height:100%;object-fit:cover}.coachNote{border-left:4px solid var(--accent);padding:12px;background:rgba(125,211,252,.08);border-radius:0 16px 16px 0;line-height:1.4}.danger{color:#fecaca}.ok{color:#bbf7d0}.warn{color:#fde68a}@media(max-width:720px){.grid{grid-template-columns:repeat(2,1fr)}.prescription{grid-template-columns:repeat(3,1fr)}.formGrid{grid-template-columns:1fr 1fr}.heroTitle{font-size:29px}.actions{grid-template-columns:1fr}.card{padding:14px}.app{padding:14px 10px 0}} 
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="top"><div class="brand"><div class="logo">V</div><div><h1>V-Taper Coach</h1><p>Projeto 12 semanas</p></div></div><div class="pill" id="todayPill">Hoje</div></div>
      <h2 class="heroTitle">Shape em V, medido e executado.</h2>
      <p class="heroSub">Ficha completa, registro de cargas, descanso, vídeos, medidas e coach local para acompanhar o protocolo V-Taper.</p>
      <div class="grid">
        <div class="metric"><b id="weekMetric">1</b><span>Semana atual</span></div>
        <div class="metric"><b id="adherenceMetric">0%</b><span>Adesão</span></div>
        <div class="metric"><b id="nextWorkoutMetric">-</b><span>Treino de hoje</span></div>
        <div class="metric"><b id="recordsMetric">0</b><span>Exercícios feitos</span></div>
      </div>
    </section>

    <section id="home" class="section active"></section>
    <section id="workout" class="section"></section>
    <section id="library" class="section"></section>
    <section id="body" class="section"></section>
    <section id="coach" class="section"></section>
  </main>

  <nav class="nav"><div class="navInner">
    <button class="active" data-view="home"><b>⌂</b>Início</button>
    <button data-view="workout"><b>💪</b>Treino</button>
    <button data-view="library"><b>▶</b>Exercícios</button>
    <button data-view="body"><b>📈</b>Corpo</button>
    <button data-view="coach"><b>🤖</b>Coach</button>
  </div></nav>

<script>
const PLAN = {
  Segunda:{title:'Costas largura + Bíceps', goal:'Abrir dorsal e priorizar bíceps', exercises:[
    ['Pullover máquina','Latíssimo do dorso',3,'20','60 s','3-1-2','2','Pré-ativar dorsal; cotovelos conduzem; evitar transformar em tríceps.'],
    ['Barra fixa/assistida','Dorsal e redondo maior',4,'6-10','90 s','2-1-2','1-2','Use straps se cotovelo/pegada limitar; não puxar com bíceps.'],
    ['Puxada aberta','Latíssimo - largura',4,'8-10','90 s','2-1-2','1-2','Não puxar atrás da cabeça; cotovelos conduzem.'],
    ['Pulldown unilateral','Dorsal inferior',3,'10-12','60 s','2-1-2','1-2','Grande amplitude e pausa de 1 s embaixo.'],
    ['Remada baixa neutra','Costas médias/dorsal',3,'10-12','75 s','2-1-2','2','Pegada neutra para poupar cotovelo; escápulas controladas.'],
    ['Scott máquina','Bíceps',4,'8-10','75 s','2-1-3','1-2','Controle total; sem roubo.'],
    ['Rosca Bayesian','Bíceps em alongamento',3,'10-12','60 s','2-1-3','1-2','Braço atrás do tronco; cabo baixo.'],
    ['Rosca inclinada','Bíceps',3,'10-12','60 s','2-1-3','1-2','Alongamento sem dor no cotovelo.'],
    ['Cardio Zona 2','Condicionamento',1,'20 min','-','-','-','Inclinação leve/moderada.']
  ]},
  Terça:{title:'Quadríceps + Panturrilha + Core', goal:'Manter/evoluir pernas sem fadiga excessiva', exercises:[
    ['Hack squat','Quadríceps',4,'8-10','120 s','3-1-2','1-2','Amplitude máxima segura; joelhos acompanham pés.'],['Leg press','Quadríceps/glúteos',3,'10-12','90 s','3-1-2','1-2','Pés um pouco mais baixos; não tirar quadril do banco.'],['Smith squat','Quadríceps',3,'8-10','90 s','3-1-2','2','Controle lombar.'],['Cadeira extensora','Quadríceps',3,'15-20','60 s','2-1-2','1','Pausa no topo; última série com drop set no bloco 3.'],['Panturrilha em pé','Panturrilha',5,'10-15','45-60 s','2-2-2','1-2','Pausa embaixo e em cima.'],['Panturrilha sentada','Panturrilha',4,'15-20','45-60 s','2-2-2','1-2','Amplitude completa.'],['Crunch máquina','Reto abdominal',4,'12-15','45 s','2-1-2','2','Sem exagerar oblíquos.'],['Cardio Zona 2','Condicionamento',1,'20 min','-','-','-','Pós-treino.']
  ]},
  Quarta:{title:'Peitoral superior + Ombros', goal:'Peito clavicular e deltoide lateral', exercises:[
    ['Supino inclinado halteres','Peitoral superior',5,'6-8','120 s','3-1-2','1-2','Banco próximo de 30 graus; escápulas fixas.'],['Supino inclinado máquina','Peitoral superior',4,'8-10','90 s','3-1-2','1-2','Convergência e controle; não deixar ombro anterior dominar.'],['Fly inclinado','Peitoral superior alongado',3,'12-15','60 s','3-1-2','1-2','Movimento de abraço; não empurrar.'],['Cross-over baixo','Peitoral clavicular',3,'12-15','60 s','2-1-2','1-2','Trajetória de baixo para cima; cotovelos aproximam.'],['Desenvolvimento máquina','Deltoides',3,'8-10','90 s','2-1-2','2','Controle e amplitude sem dor; não roubar com lombar.'],['Elevação lateral máquina','Deltoide lateral',5,'12-15','60 s','2-1-2','1','Cotovelo sobe; trapézio baixo.'],['Elevação lateral cabo','Deltoide lateral',3,'15-20','45-60 s','2-1-2','1-2','Tensão constante; sem balanço.'],['Reverse Pec Deck','Deltoide posterior',4,'12-15','60 s','2-1-2','1-2','Braços abrem; não encolher ombros.'],['Cardio Zona 2','Condicionamento',1,'15 min','-','-','-','Leve/moderado.']
  ]},
  Quinta:{title:'Costas espessura + Bíceps + Antebraço', goal:'Densidade, braço e pegada', exercises:[
    ['Remada articulada','Costas espessura',4,'8','120 s','2-1-2','1-2','Carga com técnica; peito apoiado quando possível.'],['Remada cavalinho','Costas médias',3,'8-10','90 s','2-1-2','1-2','Peito aberto; coluna estável.'],['Remada baixa fechada','Costas médias',3,'10-12','75 s','2-1-2','2','Controle escapular.'],['Pullover máquina','Latíssimo do dorso',3,'12-15','60 s','3-1-2','2','Reforço de conexão dorsal.'],['Scott máquina','Bíceps',3,'8-10','75 s','2-1-3','1-2','Bíceps sem impulso.'],['Rosca martelo','Braquial/antebraço',3,'10-12','60 s','2-1-2','2','Punho neutro; sem jogar corpo.'],['Rosca cabo','Bíceps',3,'12-15','60 s','2-1-2','1-2','Tensão constante.'],['Rosca inversa','Antebraço/braquial',3,'12-15','60 s','2-1-2','2-3','Leve, sem irritar cotovelo.'],['Rosca punho/reversa','Antebraço',3,'15-20','45 s','2-1-2','2-3','Cautela com epicondilite.'],['Farmer walk','Pegada/core',2,'30-40 m','60 s','-','2','Postura alta, passos controlados.'],['Cardio Zona 2','Condicionamento',1,'20 min','-','-','-','Pós-treino.']
  ]},
  Sexta:{title:'Posterior + Glúteo + Panturrilha', goal:'Cadeia posterior e equilíbrio', exercises:[
    ['Mesa flexora','Posterior de coxa',4,'10-12','75 s','2-1-3','1-2','Controle excêntrico; quadril colado.'],['Stiff/RDL','Posterior/glúteo',4,'6-8','120 s','3-1-2','2','Quadril para trás; coluna neutra.'],['Flexora sentada','Posterior de coxa',3,'12-15','60 s','2-1-2','1-2','Alongamento do posterior.'],['Glute Drive','Glúteos',3,'10-12','75 s','2-1-2','2','Contração no topo; não hiperestender lombar.'],['Abdutora','Glúteo médio',3,'15-20','45-60 s','2-1-2','1-2','Controle, sem impulso.'],['Panturrilha no leg','Panturrilha',5,'12-15','45-60 s','2-2-2','1-2','Pausa embaixo.'],['Panturrilha sentada','Panturrilha',4,'15-20','45-60 s','2-2-2','1-2','Amplitude total.'],['Cardio Zona 2','Condicionamento',1,'20 min','-','-','-','Moderado.']
  ]},
  Sábado:{title:'Upper V-Taper', goal:'Reforço estético dos pontos prioritários', exercises:[
    ['Pullover máquina','Latíssimo do dorso',3,'15-20','60 s','3-1-2','2','Sentir dorsal antes das puxadas.'],['Puxada aberta','Latíssimo - largura',3,'10-12','75 s','2-1-2','1-2','Largura; tronco estável.'],['Supino inclinado','Peitoral superior',3,'8-10','90 s','3-1-2','1-2','Peitoral superior.'],['Elevação lateral máquina','Deltoide lateral',6,'12-15','45-60 s','2-1-2','1','Principal exercício do dia.'],['Elevação lateral cabo','Deltoide lateral',3,'15-20','45 s','2-1-2','1-2','Sem trapézio.'],['Reverse Pec Deck','Deltoide posterior',3,'15-20','45-60 s','2-1-2','1-2','Posterior de ombro.'],['Rosca Bayesian','Bíceps em alongamento',3,'10-12','60 s','2-1-3','1-2','Alongamento do bíceps.'],['Scott máquina','Bíceps',3,'8-10','60-75 s','2-1-3','1-2','Controle.'],['Tríceps corda','Tríceps',3,'12-15','60 s','2-1-2','2','Manutenção.'],['Vacuum','Transverso abdominal',5,'20-30 s','30 s','-','-','Controle abdominal; expirar e “sugar” abdome sem dor.'],['Cardio Zona 2','Condicionamento',1,'25 min','-','-','-','Final.']
  ]},
  Domingo:{title:'Descanso', goal:'Recuperação', exercises:[]}
};
const PERIOD = [['1','Aprender execução e conexão','RIR 3','Nenhuma'],['2','Repetir melhor, aumentar reps','RIR 2','Nenhuma'],['3','Aproximar da intensidade real','RIR 1-2','Nenhuma'],['4','Consolidar técnica','RIR 1','Falha só em isoladores selecionados'],['5','Aumentar cargas pequenas','RIR 1-2','Nenhuma'],['6','Progressão de carga/reps','RIR 1','Rest-pause leve em isoladores'],['7','Manter cargas e melhorar controle','RIR 1','Rest-pause seletivo'],['8','Semana forte controlada','RIR 0-1 isoladores','Drop set seletivo'],['9','Especialização intensa','RIR 0-1','Myo-reps/Drop em laterais e bíceps'],['10','Pico de estímulo','RIR 0-1','Técnicas só em isoladores'],['11','Última semana pesada','RIR 0-1','Sem piorar articulações'],['12','Deload','RIR 3-4','Reduzir 40-50% do volume']];
const LS='vtaper_coach_v2'; const state=JSON.parse(localStorage.getItem(LS)||'{}'); state.records ||= []; state.body ||= []; state.photos ||= {}; state.settings ||= {week:1}; state.settings.selectedWorkout ||= state.settings.workout || dayName();
function save(){localStorage.setItem(LS,JSON.stringify(state)); render();}
function dayName(){return ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][new Date().getDay()]}
function ymd(){return new Date().toISOString().slice(0,10)}
function esc(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function yt(ex){return 'https://www.youtube.com/results?search_query='+encodeURIComponent(ex+' proper form musculação')}
function allExercises(){return Object.values(PLAN).flatMap(d=>d.exercises).filter((v,i,a)=>a.findIndex(x=>x[0]===v[0])===i)}
function doneToday(name){return state.records.some(r=>r.date===ymd()&&r.exercise===name)}
function lastRecord(name){return [...state.records].reverse().find(r=>r.exercise===name)}
function parseRest(rest){const m=String(rest).match(/(\d+)/);return m?parseInt(m[1],10):60}
let timer=null, remain=0;
function startTimer(sec){remain=sec; tick(); clearInterval(timer); timer=setInterval(()=>{remain--; tick(); if(remain<=0){clearInterval(timer); navigator.vibrate?.(200)}},1000); showView('coach')}
function tick(){const el=document.getElementById('timer'); if(el) el.textContent = `${String(Math.floor(remain/60)).padStart(2,'0')}:${String(remain%60).padStart(2,'0')}`}
function renderMetrics(){const plan=PLAN[dayName()]||PLAN.Domingo; document.getElementById('todayPill').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit'}); document.getElementById('weekMetric').textContent=state.settings.week; document.getElementById('nextWorkoutMetric').textContent=plan.title.split('+')[0].trim(); document.getElementById('recordsMetric').textContent=state.records.length; const days=new Set(state.records.map(r=>r.date)).size; document.getElementById('adherenceMetric').textContent=Math.min(100,Math.round(days/72*100))+'%'}
function renderHome(){const latestBody=state.body.at(-1)||{}; const today=dayName(); const plan=PLAN[today]; document.getElementById('home').innerHTML=`
  <div class="card"><div class="row"><div><h2>Plano da semana ${state.settings.week}</h2><p class="muted">${PERIOD[state.settings.week-1]?.[1]||''} • ${PERIOD[state.settings.week-1]?.[2]||''}</p></div><button class="btn secondary" onclick="state.settings.week=Math.min(12,state.settings.week+1);save()">+ Semana</button></div><div class="bar"><i style="width:${Math.round(state.settings.week/12*100)}%"></i></div></div>
  <div class="card"><h2>Treino de hoje — ${today}</h2><p class="muted">${plan.title} — ${plan.goal}</p><button class="btn" onclick="state.settings.selectedWorkout='${today}';save();showView('workout')">Abrir treino de hoje</button></div>
  <div class="grid"><div class="metric"><b>${latestBody.peso||'-'}</b><span>Peso</span></div><div class="metric"><b>${latestBody.cintura||'-'}</b><span>Cintura</span></div><div class="metric"><b>${latestBody.bracoD||'-'}</b><span>Braço D</span></div><div class="metric"><b>${new Set(state.records.map(r=>r.date)).size}</b><span>Dias com treino</span></div></div>
  <div class="card"><h2>Periodização</h2><div class="list">${PERIOD.map(p=>`<div class="libraryItem"><b>Semana ${p[0]} — ${p[1]}</b><p class="muted">${p[2]} • ${p[3]}</p></div>`).join('')}</div></div>`}
function exerciseCard(ex,idx){const [name,target,sets,reps,rest,cad,rir,obs]=ex; const last=lastRecord(name); const done=doneToday(name); return `<div class="exercise ${done?'done':''}"><div class="exHead"><div><div class="exName"><a target="_blank" href="${yt(name)}">${idx+1}. ${esc(name)}</a></div><span class="tag">${esc(target)}</span>${done?'<span class="tag ok">concluído hoje</span>':''}</div><a class="btn secondary" target="_blank" href="${yt(name)}">Vídeo</a></div><div class="prescription"><div class="mini"><b>${sets}</b><span>Séries</span></div><div class="mini"><b>${reps}</b><span>Reps</span></div><div class="mini"><b>${rest}</b><span>Desc.</span></div><div class="mini"><b>${cad}</b><span>Cad.</span></div><div class="mini"><b>${rir}</b><span>RIR</span></div></div><p class="muted">${esc(obs)}</p><p class="muted">Último registro: ${last?`${last.load||'-'} kg • ${last.reps||'-'} reps • RIR ${last.rir||'-'}`:'sem registro'}</p><div class="formGrid"><input id="load-${idx}" inputmode="decimal" placeholder="Carga kg"><input id="reps-${idx}" inputmode="numeric" placeholder="Reps feitas"><input id="rir-${idx}" inputmode="numeric" placeholder="RIR"></div><textarea id="note-${idx}" rows="2" placeholder="Observação rápida" style="margin-top:9px"></textarea><div class="actions"><button class="btn good" onclick="completeExercise(${idx})">Concluir exercício</button><button class="btn secondary" onclick="startTimer(${parseRest(rest)})">Descanso ${rest}</button></div></div>`}
function renderWorkout(){const selected=state.settings.selectedWorkout||dayName(); const plan=PLAN[selected]; document.getElementById('workout').innerHTML=`<div class="card"><h2>Escolha o treino</h2><select class="select" onchange="state.settings.selectedWorkout=this.value;save()">${Object.keys(PLAN).map(d=>`<option value="${d}" ${d===selected?'selected':''}>${d} — ${PLAN[d].title}</option>`).join('')}</select><p class="muted" style="margin-bottom:0">Você pode selecionar qualquer treino, mesmo que não corresponda ao dia atual.</p></div><div class="card"><h2>${selected} — ${plan.title}</h2><p class="muted">${plan.goal}</p><div class="bar"><i style="width:${plan.exercises.length?Math.round(plan.exercises.filter(e=>doneToday(e[0])).length/plan.exercises.length*100):100}%"></i></div></div>${plan.exercises.length?plan.exercises.map(exerciseCard).join(''):`<div class="card"><h2>Descanso</h2><p class="muted">Priorize sono, hidratação, mobilidade leve e recuperação.</p></div>`}`}
function completeExercise(idx){const selected=state.settings.selectedWorkout||dayName(); const ex=PLAN[selected].exercises[idx]; const rec={date:ymd(),day:selected,exercise:ex[0],target:ex[1],sets:ex[2],plannedReps:ex[3],load:document.getElementById(`load-${idx}`).value,reps:document.getElementById(`reps-${idx}`).value,rir:document.getElementById(`rir-${idx}`).value,note:document.getElementById(`note-${idx}`).value,ts:Date.now()}; state.records.push(rec); localStorage.setItem(LS,JSON.stringify(state)); startTimer(parseRest(ex[4])); render();}
function renderLibrary(){document.getElementById('library').innerHTML=`<div class="card"><h2>Biblioteca de exercícios</h2><p class="muted">Toque em “Vídeo” para abrir uma busca no YouTube com execução correta.</p></div><div class="tabs">${Object.keys(PLAN).filter(d=>PLAN[d].exercises.length).map(d=>`<button class="tab" onclick="state.settings.selectedWorkout='${d}';save();showView('workout')">${d}</button>`).join('')}</div><div class="list">${allExercises().map(ex=>`<div class="libraryItem"><div class="row"><div><b>${esc(ex[0])}</b><p class="muted">${esc(ex[1])} • ${ex[2]} séries • ${ex[3]} reps</p></div><a class="btn secondary" target="_blank" href="${yt(ex[0])}">Vídeo</a></div><p class="muted">${esc(ex[7])}</p></div>`).join('')}</div>`}
function renderBody(){document.getElementById('body').innerHTML=`<div class="card"><h2>Registro corporal</h2><div class="formGrid"><input id="peso" placeholder="Peso"><input id="cintura" placeholder="Cintura"><input id="bracoD" placeholder="Braço D"><input id="bracoE" placeholder="Braço E"><input id="sono" placeholder="Sono médio"><input id="dor" placeholder="Dor cotovelo 0-10"></div><textarea id="ajuste" rows="2" placeholder="Melhor exercício / ajuste necessário" style="margin-top:9px"></textarea><button class="btn" style="margin-top:10px" onclick="addBody()">Salvar medidas</button></div><div class="card"><h2>Fotos</h2><div class="photoGrid"><label class="photoBox"><input type="file" accept="image/*" hidden onchange="loadPhoto(event,'fotoA')"><span>Adicionar foto A</span><img id="fotoA" style="display:${state.photos.fotoA?'block':'none'}" src="${state.photos.fotoA||''}"></label><label class="photoBox"><input type="file" accept="image/*" hidden onchange="loadPhoto(event,'fotoB')"><span>Adicionar foto B</span><img id="fotoB" style="display:${state.photos.fotoB?'block':'none'}" src="${state.photos.fotoB||''}"></label></div></div><div class="card"><h2>Histórico de medidas</h2><div class="list">${state.body.slice().reverse().map(b=>`<div class="libraryItem"><b>${b.date}</b><p class="muted">Peso ${b.peso||'-'} • Cintura ${b.cintura||'-'} • Braço D ${b.bracoD||'-'} • Dor ${b.dor||'-'}</p><p>${esc(b.ajuste||'')}</p></div>`).join('')||'<p class="muted">Nenhum registro ainda.</p>'}</div></div>`}
function addBody(){state.body.push({date:ymd(),peso:val('peso'),cintura:val('cintura'),bracoD:val('bracoD'),bracoE:val('bracoE'),sono:val('sono'),dor:val('dor'),ajuste:val('ajuste')});save()}
function val(id){return document.getElementById(id).value}
function loadPhoto(ev,key){const file=ev.target.files[0]; if(!file) return; const r=new FileReader(); r.onload=()=>{state.photos[key]=r.result;save()}; r.readAsDataURL(file)}
function renderCoach(){const today=state.records.filter(r=>r.date===ymd()); const pain=Number(state.body.at(-1)?.dor||0); const notes=[]; if(pain>3) notes.push('<span class="danger">Dor no cotovelo acima de 3/10: reduza carga, ajuste pegada, use straps em costas e prefira cabos/máquinas.</span>'); if(today.length===0) notes.push('Nenhum exercício registrado hoje. Comece pelo treino do dia e registre carga/reps para gerar histórico.'); else notes.push(`<span class="ok">Você já registrou ${today.length} exercício(s) hoje. Continue respeitando descanso e técnica.</span>`); const byEx={}; state.records.forEach(r=>{byEx[r.exercise] ||= []; byEx[r.exercise].push(r)}); const progress=Object.entries(byEx).map(([ex,arr])=>{const last=arr.at(-1); return `<div class="libraryItem"><b>${esc(ex)}</b><p class="muted">Último: ${last.load||'-'} kg • ${last.reps||'-'} reps • RIR ${last.rir||'-'}</p></div>`}).join(''); document.getElementById('coach').innerHTML=`<div class="card"><h2>Descanso ativo</h2><div class="timer" id="timer">00:00</div><p class="muted" style="text-align:center">Use os botões de descanso após concluir cada exercício.</p></div><div class="card"><h2>Coach local</h2>${notes.map(n=>`<div class="coachNote">${n}</div>`).join('<br>')}<div class="coachNote" style="margin-top:12px">Regra de progressão: quando alcançar o topo da faixa de repetições em todas as séries com RIR planejado e técnica limpa, aumente a carga na próxima sessão.</div></div><div class="card"><h2>Histórico de treino</h2><div class="list">${progress||'<p class="muted">Sem registros ainda.</p>'}</div></div><div class="card"><h2>Exportar dados</h2><button class="btn secondary" onclick="exportData()">Baixar backup JSON</button><button class="btn secondary" style="margin-left:8px" onclick="if(confirm('Apagar todos os dados salvos neste aparelho?')){localStorage.removeItem(LS);location.reload()}">Limpar dados</button></div>`; tick()}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='vtaper-backup.json'; a.click();}
function showView(id){document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===id)); document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===id)); window.scrollTo({top:0,behavior:'smooth'}); render()}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>showView(b.dataset.view));
function render(){renderMetrics(); renderHome(); renderWorkout(); renderLibrary(); renderBody(); renderCoach()}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
render();
</script>
</body>
</html>
