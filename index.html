<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <link rel="manifest" href="manifest.json" />
  <title>V-Taper Coach</title>
  <style>
    :root{--bg:#07111f;--panel:#0d1a2e;--panel2:#111f35;--text:#eef6ff;--muted:#91a3bb;--line:rgba(255,255,255,.1);--accent:#6ee7ff;--gold:#ffce6e;--green:#7CFFB2;--red:#ff7979;--shadow:0 20px 60px rgba(0,0,0,.35);--r:24px}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at top left,#173a68 0,#07111f 45%,#03060d 100%);color:var(--text);min-height:100vh}.app{max-width:520px;margin:0 auto;min-height:100vh;padding:18px 16px 92px}.hero{padding:22px;border:1px solid var(--line);border-radius:30px;background:linear-gradient(145deg,rgba(110,231,255,.16),rgba(255,206,110,.07)),rgba(13,26,46,.82);box-shadow:var(--shadow);position:relative;overflow:hidden}.hero:after{content:"";position:absolute;right:-60px;top:-70px;width:180px;height:180px;border-radius:50%;background:rgba(110,231,255,.18);filter:blur(8px)}.kicker{color:var(--accent);font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase}.title{font-size:32px;font-weight:900;margin:8px 0 2px}.sub{color:var(--muted);font-size:14px;line-height:1.35}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}.metric{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:18px;padding:12px}.metric b{font-size:18px}.metric span{display:block;color:var(--muted);font-size:11px;margin-top:3px}.section{margin-top:18px}.row{display:flex;align-items:center;justify-content:space-between;gap:12px}.h2{font-size:18px;font-weight:900;margin:0 0 12px}.card{background:rgba(13,26,46,.82);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:0 10px 35px rgba(0,0,0,.18)}.tabs{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);width:min(492px,calc(100% - 24px));display:grid;grid-template-columns:repeat(5,1fr);gap:6px;background:rgba(8,16,28,.86);backdrop-filter:blur(18px);border:1px solid var(--line);padding:8px;border-radius:26px;z-index:10}.tab{border:0;border-radius:18px;background:transparent;color:var(--muted);padding:9px 4px;font-size:11px;font-weight:700}.tab.active{background:linear-gradient(135deg,rgba(110,231,255,.24),rgba(255,206,110,.12));color:var(--text)}button{cursor:pointer}.primary{border:0;border-radius:16px;background:linear-gradient(135deg,var(--accent),#78ffbd);color:#04101d;font-weight:900;padding:13px 16px}.ghost{border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.06);color:var(--text);font-weight:800;padding:12px 14px}.exercise{border-top:1px solid var(--line);padding:14px 0}.exercise:first-child{border-top:0}.tag{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:5px 9px;color:var(--muted);font-size:11px;margin:4px 4px 0 0}.progress{height:10px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));width:0%}input,select,textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--text);border-radius:15px;padding:12px;font-size:16px}label{font-size:12px;color:var(--muted);font-weight:700}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.view{display:none}.view.active{display:block}.timer{font-size:44px;font-weight:950;letter-spacing:-.04em;text-align:center;margin:10px 0;color:var(--gold)}.done{opacity:.52;text-decoration:line-through}.list{display:grid;gap:10px}.mini{font-size:12px;color:var(--muted)}.coach{border-left:4px solid var(--accent)}.pill{border-radius:999px;padding:6px 10px;background:rgba(110,231,255,.12);color:var(--accent);font-size:12px;font-weight:900}.chart{height:160px;display:flex;align-items:end;gap:8px;padding-top:18px}.col{flex:1;background:linear-gradient(180deg,var(--accent),rgba(110,231,255,.12));border-radius:10px 10px 0 0;min-height:12px}.photoBox{aspect-ratio:1/1.15;border:1px dashed rgba(255,255,255,.24);border-radius:20px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:rgba(255,255,255,.04);text-align:center;padding:12px;overflow:hidden}.photoBox img{width:100%;height:100%;object-fit:cover}.smallBtn{font-size:12px;padding:8px 10px;border-radius:12px}.warn{color:var(--gold)}a{color:var(--accent);text-decoration:none}
  </style>
</head><body><main class="app">
  <section class="hero"><div class="kicker">Projeto 12 semanas</div><div class="title">V‑Taper Coach</div><div class="sub">Treino inteligente para costas mais largas, ombros redondos, peitoral superior e bíceps em destaque.</div><div class="metrics"><div class="metric"><b id="week">1</b><span>semana</span></div><div class="metric"><b id="todayDone">0%</b><span>treino hoje</span></div><div class="metric"><b id="streak">0</b><span>sequência</span></div></div></section>
  <section id="home" class="view active"></section><section id="train" class="view"></section><section id="log" class="view"></section><section id="body" class="view"></section><section id="coach" class="view"></section>
</main><nav class="tabs"><button class="tab active" data-v="home">Início</button><button class="tab" data-v="train">Treino</button><button class="tab" data-v="log">Histórico</button><button class="tab" data-v="body">Corpo</button><button class="tab" data-v="coach">Coach</button></nav>
<script>
const workouts={0:{name:'Descanso',goal:'Recuperação',ex:[]},1:{name:'Costas largura + Bíceps',goal:'Abrir dorsal e priorizar bíceps',ex:[['Pullover máquina','3','20','60s','3-1-2','2'],['Barra fixa/assistida','4','6-10','90s','2-1-2','1-2'],['Puxada aberta','4','8-10','90s','2-1-2','1-2'],['Pulldown unilateral','3','10-12','60s','2-1-2','1-2'],['Remada baixa neutra','3','10-12','75s','2-1-2','2'],['Scott máquina','4','8-10','75s','2-1-3','1-2'],['Rosca Bayesian','3','10-12','60s','2-1-3','1-2'],['Rosca inclinada','3','10-12','60s','2-1-3','1-2']]},2:{name:'Quadríceps + Panturrilha + Core',goal:'Manter/evoluir pernas sem fadiga excessiva',ex:[['Hack squat','4','8-10','120s','3-1-2','1-2'],['Leg press','3','10-12','90s','3-1-2','1-2'],['Smith squat','3','8-10','90s','3-1-2','2'],['Cadeira extensora','3','15-20','60s','2-1-2','1'],['Panturrilha em pé','5','10-15','60s','2-2-2','1-2'],['Panturrilha sentada','4','15-20','60s','2-2-2','1-2'],['Crunch máquina','4','12-15','45s','2-1-2','2']]},3:{name:'Peitoral superior + Ombros',goal:'Peito clavicular e deltoide lateral',ex:[['Supino inclinado halteres','5','6-8','120s','3-1-2','1-2'],['Supino inclinado máquina','4','8-10','90s','3-1-2','1-2'],['Fly inclinado','3','12-15','60s','3-1-2','1-2'],['Cross-over baixo','3','12-15','60s','2-1-2','1-2'],['Desenvolvimento máquina','3','8-10','90s','2-1-2','2'],['Elevação lateral máquina','5','12-15','60s','2-1-2','1'],['Elevação lateral cabo','3','15-20','60s','2-1-2','1-2'],['Reverse Pec Deck','4','12-15','60s','2-1-2','1-2']]},4:{name:'Costas espessura + Bíceps + Antebraço',goal:'Densidade, braço e pegada',ex:[['Remada articulada','4','8','120s','2-1-2','1-2'],['Remada cavalinho','3','8-10','90s','2-1-2','1-2'],['Remada baixa fechada','3','10-12','75s','2-1-2','2'],['Pullover máquina','3','12-15','60s','3-1-2','2'],['Scott máquina','3','8-10','75s','2-1-3','1-2'],['Rosca martelo','3','10-12','60s','2-1-2','2'],['Rosca cabo','3','12-15','60s','2-1-2','1-2'],['Rosca inversa','3','12-15','60s','2-1-2','2-3'],['Farmer walk','2','30-40m','60s','-','2']]},5:{name:'Posterior + Glúteo + Panturrilha',goal:'Cadeia posterior e equilíbrio',ex:[['Mesa flexora','4','10-12','75s','2-1-3','1-2'],['Stiff/RDL','4','6-8','120s','3-1-2','2'],['Flexora sentada','3','12-15','60s','2-1-2','1-2'],['Glute Drive','3','10-12','75s','2-1-2','2'],['Abdutora','3','15-20','60s','2-1-2','1-2'],['Panturrilha no leg','5','12-15','60s','2-2-2','1-2'],['Panturrilha sentada','4','15-20','60s','2-2-2','1-2']]},6:{name:'Upper V‑Taper',goal:'Reforço estético dos pontos prioritários',ex:[['Pullover máquina','3','15-20','60s','3-1-2','2'],['Puxada aberta','3','10-12','75s','2-1-2','1-2'],['Supino inclinado','3','8-10','90s','3-1-2','1-2'],['Elevação lateral máquina','6','12-15','60s','2-1-2','1'],['Elevação lateral cabo','3','15-20','45s','2-1-2','1-2'],['Reverse Pec Deck','3','15-20','60s','2-1-2','1-2'],['Rosca Bayesian','3','10-12','60s','2-1-3','1-2'],['Scott máquina','3','8-10','75s','2-1-3','1-2'],['Tríceps corda','3','12-15','60s','2-1-2','2'],['Vacuum','5','20-30s','30s','-','-']]}};
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)], key='vtaper.unique.v1';let db=JSON.parse(localStorage.getItem(key)||'{"logs":[],"body":[],"photos":[],"start":""}');if(!db.start)db.start=new Date().toISOString().slice(0,10);const save=()=>localStorage.setItem(key,JSON.stringify(db));const today=()=>new Date().toISOString().slice(0,10);const dow=()=>new Date().getDay();const w=workouts[dow()];function programWeek(){return Math.min(12,Math.max(1,Math.floor((new Date(today())-new Date(db.start))/604800000)+1))}function todayLogs(){return db.logs.filter(x=>x.date===today())}function pct(){return w.ex.length?Math.round((new Set(todayLogs().map(x=>x.exercise)).size/w.ex.length)*100):100}function renderShell(){ $('#week').textContent=programWeek(); $('#todayDone').textContent=pct()+'%'; $('#streak').textContent=streak();}function streak(){let n=0,d=new Date();for(;;){let s=d.toISOString().slice(0,10),has=db.logs.some(x=>x.date===s);if(has)n++;else if(s!==today())break;d.setDate(d.getDate()-1);if(n>99)break}return n}function renderHome(){let p=pct();$('#home').innerHTML=`<div class="section card"><div class="row"><div><div class="h2">Treino de hoje</div><div style="font-size:24px;font-weight:950">${w.name}</div><div class="mini">${w.goal}</div></div><span class="pill">${p}%</span></div><div class="progress" style="margin:16px 0"><div class="bar" style="width:${p}%"></div></div><button class="primary" onclick="go('train')">Iniciar treino</button></div><div class="section card coach"><div class="h2">Insight do Coach</div><p class="mini" style="font-size:14px;line-height:1.5">${insight()}</p></div><div class="section card"><div class="h2">Regra articular</div><div class="mini">Se a dor no cotovelo passar de <b class="warn">3/10</b>, reduza carga, mude pegada ou substitua o exercício.</div></div>`}
function renderTrain(){let done=new Set(todayLogs().map(x=>x.exercise));$('#train').innerHTML=`<div class="section"><div class="h2">${w.name}</div><div class="mini">Semana ${programWeek()} • ${w.goal}</div></div><div class="section card"><div class="timer" id="timer">00:00</div><div class="row"><button class="ghost" onclick="startTimer(60)">60s</button><button class="ghost" onclick="startTimer(75)">75s</button><button class="ghost" onclick="startTimer(90)">90s</button></div></div><div class="section card">${w.ex.map((e,i)=>`<div class="exercise ${done.has(e[0])?'done':''}"><div class="row"><div><b>${i+1}. ${e[0]}</b><div><span class="tag">${e[1]} séries</span><span class="tag">${e[2]} reps</span><span class="tag">RIR ${e[5]}</span><span class="tag">${e[3]}</span></div></div><button class="ghost smallBtn" onclick="openLog('${e[0].replaceAll("'","`")}', '${e[3]}')">Registrar</button></div></div>`).join('')}</div><dialog id="dlg" style="border:0;border-radius:24px;background:#0d1a2e;color:white;padding:18px;max-width:420px;width:92%"><form method="dialog"><h3 id="dlgTitle"></h3><div class="grid2"><p><label>Carga</label><input id="carga" placeholder="kg"></p><p><label>Reps</label><input id="reps" placeholder="ex.: 10,10,9"></p><p><label>RIR</label><input id="rir" placeholder="1-2"></p><p><label>Dor cotovelo 0-10</label><input id="dor" type="number" min="0" max="10" value="0"></p></div><p><label>Observação</label><textarea id="obs" rows="2"></textarea></p><div class="row"><button class="ghost">Cancelar</button><button class="primary" onclick="saveLog(event)">Salvar</button></div></form></dialog>`}
let currentEx='',currentRest=60,timerInt=null;function openLog(ex,rest){currentEx=ex;currentRest=parseInt(rest)||60;$('#dlgTitle').textContent=ex;$('#dlg').showModal()}function saveLog(ev){ev.preventDefault();db.logs.push({date:today(),week:programWeek(),exercise:currentEx,carga:$('#carga').value,reps:$('#reps').value,rir:$('#rir').value,dor:+$('#dor').value,obs:$('#obs').value,ts:Date.now()});save();$('#dlg').close();startTimer(currentRest);renderAll()}function startTimer(s){clearInterval(timerInt);let t=s;const el=$('#timer');if(!el)return;timerInt=setInterval(()=>{let m=String(Math.floor(t/60)).padStart(2,'0'),ss=String(t%60).padStart(2,'0');el.textContent=`${m}:${ss}`;if(t--<=0){clearInterval(timerInt);navigator.vibrate&&navigator.vibrate(250)}},1000)}function renderLog(){let logs=[...db.logs].reverse();$('#log').innerHTML=`<div class="section row"><h2 class="h2">Histórico</h2><button class="ghost smallBtn" onclick="exportData()">Backup</button></div><div class="list">${logs.length?logs.map(x=>`<div class="card"><b>${x.exercise}</b><div class="mini">${x.date} • Semana ${x.week}</div><div style="margin-top:8px"><span class="tag">${x.carga||'-'} kg</span><span class="tag">${x.reps||'-'} reps</span><span class="tag">RIR ${x.rir||'-'}</span><span class="tag">Dor ${x.dor}/10</span></div>${x.obs?`<p class="mini">${x.obs}</p>`:''}</div>`).join(''):'<div class="card mini">Nenhum treino registrado ainda.</div>'}</div>`}
function renderBody(){let last=db.body.at(-1)||{};$('#body').innerHTML=`<div class="section card"><div class="h2">Medidas corporais</div><div class="grid2"><p><label>Peso</label><input id="peso" value="${last.peso||''}"></p><p><label>Cintura</label><input id="cintura" value="${last.cintura||''}"></p><p><label>Braço D</label><input id="bracoD" value="${last.bracoD||''}"></p><p><label>Braço E</label><input id="bracoE" value="${last.bracoE||''}"></p></div><button class="primary" onclick="saveBody()">Salvar medidas</button></div><div class="section card"><div class="h2">Evolução de peso</div><div class="chart">${chartBars()}</div></div><div class="section card"><div class="h2">Fotos</div><div class="grid2"><label class="photoBox">Adicionar foto<input type="file" accept="image/*" style="display:none" onchange="addPhoto(event)"></label>${(db.photos.slice(-1)[0]?`<div class="photoBox"><img src="${db.photos.slice(-1)[0].src}"></div>`:'<div class="photoBox">Última foto aparecerá aqui</div>')}</div></div>`}function saveBody(){db.body.push({date:today(),peso:$('#peso').value,cintura:$('#cintura').value,bracoD:$('#bracoD').value,bracoE:$('#bracoE').value});save();renderAll()}function chartBars(){let vals=db.body.map(x=>parseFloat((x.peso||'').replace(',','.'))).filter(Boolean).slice(-8);if(!vals.length)return '<div class="mini">Sem dados ainda.</div>';let max=Math.max(...vals),min=Math.min(...vals);return vals.map(v=>`<div class="col" title="${v}" style="height:${20+((v-min)/(max-min||1))*120}px"></div>`).join('')}function addPhoto(ev){let f=ev.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{db.photos.push({date:today(),src:r.result});save();renderAll()};r.readAsDataURL(f)}function renderCoach(){ $('#coach').innerHTML=`<div class="section card coach"><div class="h2">IA Coach local</div><p class="mini" style="font-size:14px;line-height:1.55">${insight()}</p></div><div class="section card"><div class="h2">Próxima ação</div><p class="mini">${nextAction()}</p></div><div class="section card"><div class="h2">Volume de hoje</div><p class="mini">${w.ex.length} exercícios programados • ${todayLogs().length} registros feitos.</p></div>`}
function insight(){let highPain=db.logs.slice(-12).find(x=>x.dor>3);if(highPain)return `Atenção: houve registro de dor ${highPain.dor}/10 em ${highPain.exercise}. Hoje priorize pegada neutra, controle e redução de carga.`;let p=pct();if(p===0)return `Comece pelo primeiro exercício e registre carga/repetições. O objetivo é transformar percepção em dado.`;if(p<100)return `Bom início. Complete o treino mantendo RIR planejado e técnica limpa.`;return `Treino concluído. Na próxima sessão, se alcançou o topo da faixa de reps com técnica limpa, considere pequeno aumento de carga.`}function nextAction(){let last=db.logs.at(-1);if(!last)return 'Registrar o primeiro exercício de hoje.';if(last.dor>3)return 'Ajustar exercício/pegada antes de progredir carga.';return 'Comparar a próxima sessão com a carga e reps registradas agora.'}function exportData(){let blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='vtaper-backup.json';a.click()}function go(v){$$('.view').forEach(x=>x.classList.remove('active'));$('#'+v).classList.add('active');$$('.tab').forEach(x=>x.classList.toggle('active',x.dataset.v===v));renderAll()}$$('.tab').forEach(b=>b.onclick=()=>go(b.dataset.v));function renderAll(){renderShell();renderHome();renderTrain();renderLog();renderBody();renderCoach()}renderAll();if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script></body></html>
